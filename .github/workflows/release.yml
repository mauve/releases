# Tag-triggered: build, verify, create GitHub release, publish to npm.
#
# Workflow:
#   1. Local: ./scripts/release.sh 0.1.0   →   bumps versions, edits CHANGELOG, tags `v0.1.0`.
#   2. Local: git push && git push --tags  →   this workflow runs on the v* tag.
#
# Publishing:
#   Uses npm Trusted Publishing (OIDC) — no token storage required.
#   Set up at https://www.npmjs.com/settings/your-username/access-tokens

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Create GitHub release and publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Verify tag matches package.json version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          EXPECTED="${GITHUB_REF_NAME#v}"
          ACTUAL=$(node -p "require('./packages/core/package.json').version")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $ACTUAL" >&2
            echo "Bump versions and re-tag, or remove the wrongly-placed tag." >&2
            exit 1
          fi
          echo "Tag and package.json agree on $ACTUAL."

      - name: Extract release notes from CHANGELOG.md
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/extract-changelog.mjs "$VERSION" > release-notes.md
          echo "----- release notes -----"
          cat release-notes.md
          echo "-------------------------"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi

      - name: Publish packages to npm
        run: pnpm --filter "@mauve/*" publish --access public
